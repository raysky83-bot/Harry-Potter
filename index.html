<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⚡ 해리포터 VS 볼드모트: 얼티밋 듀얼 ⚡</title>
<!-- [기존 스타일 시트 동일 유지] -->
<style>
    /* CSS는 기존과 동일하므로 생략하거나 필요한 부분만 유지합니다 */
    :root { --gold: #f0c060; --dark-bg: #0a0a18; --panel-bg: #10102a; --panel-border: #2a2a5a; --harry-color: #4a9eff; --voldy-color: #b44aff; --danger: #e74c3c; --success: #2ecc71; --warn: #f1c40f; --muted: #8899aa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; overflow-x: hidden; }
    /* ... (기존 스타일 소스코드 복사본 유지) ... */
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .star  { position: absolute; background: white; border-radius: 50%; animation: twinkle linear infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.4)} }
    #difficultyScreen { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 20px; background: var(--dark-bg); }
    .diff-main-title { font-family: 'Cinzel', serif; font-size: 34px; font-weight: 900; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 50px rgba(240,192,96,0.7); animation: titleGlow 2s ease-in-out infinite alternate; }
    .diff-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; width: 100%; max-width: 860px; }
    .diff-card { background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 16px; padding: 22px 14px 18px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.22s ease; position: relative; overflow: hidden; }
    .diff-card:hover { transform: translateY(-6px); border-color: var(--gold); }
    #gameScreen { display: none; }
    .wrapper { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:16px; }
    .battlefield { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin-bottom:12px; }
    .fighter-panel { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:12px; padding:14px; display:flex; flex-direction:column; align-items:center; gap:7px; transition:0.3s; position:relative; }
    .active-turn { border-color: var(--gold) !important; box-shadow: 0 0 20px rgba(240,192,96,0.2); }
    .sprite-img { width:140px; height:180px; object-fit:contain; }
    .hp-track { width:100%; height:9px; background:rgba(255,255,255,0.07); border-radius:5px; overflow:hidden; }
    .hp-fill { height:100%; transition: width 0.4s; }
    .spell-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .spell-btn { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:10px; padding:10px 6px; cursor:pointer; color:white; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .spell-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #timingOverlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.9); flex-direction:column; align-items:center; justify-content:center; gap:20px; }
    .timing-bar-wrap { position:relative; width:380px; height:48px; background:rgba(255,255,255,0.1); border-radius:12px; overflow:hidden; }
    #timingCursor { position:absolute; top:0; width:10px; height:100%; background:white; box-shadow: 0 0 15px white; }
    .tz-crit-zone { position:absolute; height:100%; background:rgba(241,196,15,0.5); display:flex; align-items:center; justify-content:center; font-size:10px; color:white; }
    #logBox { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:10px; height:120px; overflow-y:auto; padding:10px; font-size:12px; margin-bottom:10px; }
    .dmg-popup { position:absolute; top: -20px; font-weight:900; animation: dmgAnim 1s forwards; }
    @keyframes dmgAnim { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-50px); } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- 난이도 선택 -->
<div id="difficultyScreen">
    <div class="diff-main-title">⚡ WIZARD DUEL ⚡</div>
    <div class="diff-grid">
        <div class="diff-card" onclick="selectDifficulty('easy')"><h3>EASY</h3><p>입문자용</p></div>
        <div class="diff-card" onclick="selectDifficulty('normal')"><h3>NORMAL</h3><p>표준 대결</p></div>
        <div class="diff-card" onclick="selectDifficulty('hard')"><h3>HARD</h3><p>죽음을 먹는 자급</p></div>
        <div class="diff-card" onclick="selectDifficulty('master')"><h3>MASTER</h3><p>볼드모트급</p></div>
    </div>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
    <div class="wrapper">
        <div id="logBox"></div>
        <div class="battlefield">
            <div class="fighter-panel" id="harryPanel">
                <div class="fighter-name">HARRY</div>
                <div id="harryLvBadge">Lv.1</div>
                <img id="harryImg" class="sprite-img" src="https://via.placeholder.com/140x180/4a9eff/ffffff?text=HARRY" alt="Harry">
                <div id="harryBadges"></div>
                <div class="hp-track"><div id="harryHpBar" class="hp-fill" style="background:#2ecc71; width:100%;"></div></div>
                <div id="harryHpNum">100/100</div>
                <div id="harryMpLabel">MP: 100</div>
            </div>
            <div class="vs-center">VS</div>
            <div class="fighter-panel" id="voldyPanel">
                <div class="fighter-name">VOLDEMORT</div>
                <div id="voldyLvBadge">Lv.1</div>
                <img id="voldyImg" class="sprite-img" src="https://via.placeholder.com/140x180/b44aff/ffffff?text=VOLDY" alt="Voldy">
                <div id="voldyBadges"></div>
                <div class="hp-track"><div id="voldyHpBar" class="hp-fill" style="background:#2ecc71; width:100%;"></div></div>
                <div id="voldyHpNum">160/160</div>
            </div>
        </div>

        <div class="spell-grid">
            <button class="spell-btn" id="btnExpel" onclick="startTiming('익스펙토')"><b>Expelliarmus</b><br>20MP / 피해 22</button>
            <button class="spell-btn" id="btnStupefy" onclick="startTiming('스투페파이')"><b>Stupefy</b><br>30MP / 턴스킵(크리)</button>
            <button class="spell-btn" id="btnProtego" onclick="startTiming('프로테고')"><b>Protego</b><br>15MP / 회피율85%</button>
            <button class="spell-btn" id="btnAvada" onclick="startTiming('아바다')"><b>Avada Kedavra</b><br>50MP / 피해 85(극악)</button>
            <button class="spell-btn" id="btnLumos" onclick="startTiming('루모스')"><b>Lumos</b><br>30MP / MP회복</button>
            <button class="spell-btn" id="btnWait" onclick="doWait()"><b>Wait</b><br>턴넘기기 / MP+20</button>
        </div>
    </div>
</div>

<!-- 타이밍 미니게임 -->
<div id="timingOverlay">
    <h2 id="timingSpellName">주문 시전 중...</h2>
    <div id="speedIndicator" style="color:var(--gold)"></div>
    <div class="timing-bar-wrap" id="timingBarWrap">
        <div id="tzCrit" class="tz-crit-zone"></div>
        <div id="timingCursor"></div>
    </div>
    <button onclick="doStop()" style="padding:20px 50px; font-size:20px; cursor:pointer;">STOP!</button>
</div>

<script>
// --- 전역 상태 ---
let D = {};
const STATE = {
    harryHP: 100, harryMaxHP: 100, harryMP: 100,
    voldyHP: 160, voldyMaxHP: 160,
    turn: 1, isOver: false, isProcessing: false, // 볼드모트 공격 중복 방지 플래그
    stupefyCd: 0, avadaCd: 0,
    harryShield: false, voldyStunned: false
};

const PRESETS = {
    easy: { vHP: 110, speed: 0.3, critW: 0.2 },
    normal: { vHP: 160, speed: 0.5, critW: 0.12 },
    hard: { vHP: 220, speed: 0.7, critW: 0.08 },
    master: { vHP: 300, speed: 0.9, critW: 0.05 }
};

// --- 초기화 ---
function selectDifficulty(key) {
    D = PRESETS[key];
    STATE.voldyHP = STATE.voldyMaxHP = D.vHP;
    document.getElementById('difficultyScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    updateUI();
    addLog("결투가 시작되었습니다!", "#f0c060");
}

function addLog(msg, color="white") {
    const lb = document.getElementById('logBox');
    lb.innerHTML += `<div style="color:${color}">${msg}</div>`;
    lb.scrollTop = lb.scrollHeight;
}

// --- 타이밍 미니게임 엔진 ---
let rafId, isTiming = false, curSpell = '', cursorPos = 0, cursorDir = 1, curSpeed = 0;

function startTiming(spell) {
    if (STATE.turn !== 1 || STATE.isOver || STATE.isProcessing) return;
    
    // 쿨타임 및 MP 체크
    if (spell === '스투페파이' && STATE.stupefyCd > 0) return addLog(`Stupefy 쿨타임 중! (${STATE.stupefyCd}턴)`, "orange");
    if (spell === '아바다' && STATE.harryMP < 50) return addLog("MP가 부족합니다!", "red");

    curSpell = spell;
    document.getElementById('timingOverlay').style.display = 'flex';
    document.getElementById('timingSpellName').innerText = spell;
    
    // 주문별 난이도 설정
    let speedMult = 1, critMult = 1;
    if (spell === '아바다') { speedMult = 2.2; critMult = 0.4; } // 아바다는 엄청 빠르고 좁음
    if (spell === '프로테고') { speedMult = 0.6; }

    curSpeed = D.speed * speedMult;
    const critW = D.critW * critMult;
    const bw = 380;
    
    const critZone = document.getElementById('tzCrit');
    critZone.style.width = (critW * bw * 2) + "px";
    critZone.style.left = (bw / 2 - critW * bw) + "px";

    isTiming = true;
    loop();
}

function loop() {
    if (!isTiming) return;
    cursorPos += (curSpeed * cursorDir * 2);
    if (cursorPos >= 100 || cursorPos <= 0) cursorDir *= -1;
    document.getElementById('timingCursor').style.left = cursorPos + "%";
    rafId = requestAnimationFrame(loop);
}

function doStop() {
    isTiming = false;
    cancelAnimationFrame(rafId);
    document.getElementById('timingOverlay').style.display = 'none';

    // 판정 (50%가 중앙)
    const dist = Math.abs(cursorPos - 50);
    let result = 'miss';
    const critThreshold = (D.critW * (curSpell === '아바다' ? 0.4 : 1)) * 100;

    if (dist < critThreshold) result = 'crit';
    else if (dist < critThreshold * 2.5) result = 'hit';

    executeHarrySpell(curSpell, result);
}

// --- 해리 주문 실행 ---
function executeHarrySpell(spell, result) {
    STATE.isProcessing = true; // 동작 시작
    let dmg = 0;
    STATE.harryShield = false;

    if (result === 'miss') {
        addLog(`${spell} 시전 실패!`, "#8899aa");
    } else {
        const mult = result === 'crit' ? 1.5 : 1;
        if (spell === '익스펙토') {
            dmg = Math.round(22 * mult);
            STATE.voldyHP -= dmg;
            addLog(`Expelliarmus! 볼드모트에게 ${dmg} 데미지!`, "#4a9eff");
        } else if (spell === '스투페파이') {
            dmg = 10; STATE.voldyHP -= dmg;
            if (result === 'crit') {
                STATE.voldyStunned = true;
                STATE.stupefyCd = 3; // 쿨타임 부여
                addLog("Stupefy! 볼드모트가 기절했습니다! (추가 턴 획득)", "yellow");
            } else {
                addLog("Stupefy! 데미지만 입혔습니다.", "#4a9eff");
            }
        } else if (spell === '프로테고') {
            STATE.harryShield = true;
            addLog("Protego! 강력한 방어막을 생성했습니다. (회피율 대폭 상승)", "#2ecc71");
        } else if (spell === '아바다') {
            dmg = Math.round(85 * mult);
            STATE.voldyHP -= dmg;
            addLog(`AVADA KEDAVRA!!! 볼드모트에게 ${dmg}의 치명상!`, "#e74c3c");
        } else if (spell === '루모스') {
            STATE.harryMP = Math.min(100, STATE.harryMP + 50);
            addLog("Lumos Maxima! MP를 대폭 회복했습니다.", "#f1c40f");
        }
        STATE.harryMP -= { '익스펙토': 20, '스투페파이': 30, '프로테고': 15, '아바다': 50, '루모스': 0 }[spell] || 0;
    }

    updateUI();
    if (checkEnd()) return;

    // 턴 교대 로직
    setTimeout(() => {
        if (STATE.voldyStunned) {
            STATE.voldyStunned = false;
            STATE.isProcessing = false;
            addLog("해리의 연속 턴!");
        } else {
            STATE.turn = 2;
            voldyTurn();
        }
    }, 1000);
}

// --- 볼드모트 턴 ---
function voldyTurn() {
    if (STATE.isOver) return;
    addLog("볼드모트가 주문을 외웁니다...", "#b44aff");

    setTimeout(() => {
        // 해리 방어막(Protego) 발동 시 85% 확률로 회피
        if (STATE.harryShield && Math.random() < 0.85) {
            addLog("해리가 Protego로 볼드모트의 공격을 완전히 튕겨냈습니다!", "#2ecc71");
        } else {
            let vDmg = Math.round((20 + Math.random() * 10) * (D.vHP / 100));
            if (STATE.harryShield) vDmg = Math.round(vDmg * 0.3); // 회피 실패해도 70% 경감
            STATE.harryHP -= vDmg;
            addLog(`볼드모트의 공격! 해리에게 ${vDmg} 데미지!`, "#e74c3c");
        }

        STATE.harryShield = false;
        if (STATE.stupefyCd > 0) STATE.stupefyCd--;
        
        STATE.turn = 1;
        STATE.isProcessing = false;
        updateUI();
        checkEnd();
    }, 1500);
}

function doWait() {
    if (STATE.turn !== 1 || STATE.isProcessing) return;
    STATE.harryMP = Math.min(100, STATE.harryMP + 20);
    addLog("해리가 숨을 고르며 MP를 회복합니다.");
    STATE.turn = 2;
    updateUI();
    voldyTurn();
}

function updateUI() {
    document.getElementById('harryHpBar').style.width = (STATE.harryHP / STATE.harryMaxHP * 100) + "%";
    document.getElementById('voldyHpBar').style.width = (STATE.voldyHP / STATE.voldyMaxHP * 100) + "%";
    document.getElementById('harryHpNum').innerText = `${Math.max(0, STATE.harryHP)}/${STATE.harryMaxHP}`;
    document.getElementById('voldyHpNum').innerText = `${Math.max(0, STATE.voldyHP)}/${STATE.voldyMaxHP}`;
    document.getElementById('harryMpLabel').innerText = `MP: ${STATE.harryMP}`;
    
    // 버튼 활성화 제어
    document.querySelectorAll('.spell-btn').forEach(btn => {
        btn.disabled = (STATE.turn !== 1 || STATE.isProcessing);
    });
}

function checkEnd() {
    if (STATE.voldyHP <= 0) {
        addLog("축하합니다! 볼드모트를 물리쳤습니다!", "gold");
        STATE.isOver = true; return true;
    }
    if (STATE.harryHP <= 0) {
        addLog("해리가 쓰러졌습니다... 세계는 어둠에 잠깁니다.", "red");
        STATE.isOver = true; return true;
    }
    return false;
}
</script>
</body>
</html>
