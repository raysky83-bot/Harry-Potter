<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⚡ 해리포터 VS 볼드모트: 얼티밋 듀얼 ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c060;
    --dark-bg: #0a0a18;
    --panel-bg: #10102a;
    --panel-border: #2a2a5a;
    --harry-color: #4a9eff;
    --voldy-color: #b44aff;
    --danger: #e74c3c;
    --success: #2ecc71;
    --warn: #f1c40f;
    --muted: #8899aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; overflow-x: hidden; }

  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star  { position: absolute; background: white; border-radius: 50%; animation: twinkle linear infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.4)} }

  /* --- Difficulty Screen --- */
  #difficultyScreen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; background: var(--dark-bg);
  }
  .diff-main-title {
    font-family: 'Cinzel', serif; font-size: 34px; font-weight: 900;
    color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 30px rgba(240,192,96,0.5);
  }
  .diff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; padding: 20px; }
  .diff-card {
    background: var(--panel-bg); border: 2px solid var(--panel-border);
    border-radius: 16px; padding: 20px; cursor: pointer; text-align: center;
    transition: 0.3s;
  }
  .diff-card:hover { border-color: var(--gold); transform: translateY(-5px); }

  /* --- Game Screen --- */
  #gameScreen { display: none; }
  .wrapper { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:16px; }
  .status-bar { display:flex; align-items:center; justify-content:space-between; background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px; padding:10px 15px; margin-bottom:15px; }

  .battlefield { display:grid; grid-template-columns:1fr auto 1fr; gap:15px; align-items:center; margin-bottom:15px; }
  .fighter-panel { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:12px; padding:15px; display:flex; flex-direction:column; align-items:center; gap:10px; transition: 0.3s; }
  .active-turn { border-color: var(--gold); box-shadow: 0 0 20px rgba(240,192,96,0.15); }

  .sprite-area { width:140px; height:180px; display:flex; align-items:center; justify-content:center; }
  .sprite-img { width:100%; height:100%; object-fit:contain; border-radius: 10px; }

  .hp-track { width:100%; height:10px; background:rgba(255,255,255,0.1); border-radius:5px; overflow:hidden; margin: 5px 0; }
  .hp-fill { height:100%; transition: width 0.4s ease; }
  .mp-label { font-size: 12px; color: var(--harry-color); font-weight: bold; }

  #logBox { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:10px; height:120px; overflow-y:auto; padding:10px; font-size:12px; line-height:1.6; margin-bottom:15px; }

  .spell-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .spell-btn {
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:10px;
    padding:12px 5px; cursor:pointer; color:white; display:flex; flex-direction:column;
    align-items:center; gap:5px; transition: 0.2s;
  }
  .spell-btn:hover:not(:disabled) { background: #1a1a3a; transform: translateY(-2px); }
  .spell-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .spell-name { font-family: 'Cinzel', serif; font-size: 11px; font-weight: bold; }
  .spell-cost { font-size: 10px; color: #7799ff; }

  /* --- Timing Overlay --- */
  #timingOverlay {
    display:none; position:fixed; inset:0; z-index:10000;
    background:rgba(0,0,0,0.95); flex-direction:column;
    align-items:center; justify-content:center; gap:25px;
  }
  .timing-bar-wrap {
    position:relative; width:400px; height:50px;
    background:rgba(255,255,255,0.05); border-radius:25px;
    border: 2px solid rgba(255,255,255,0.1); overflow:hidden;
  }
  .tz-crit-zone { position:absolute; height:100%; background:rgba(241,196,15,0.4); display:flex; align-items:center; justify-content:center; font-size:10px; color:white; font-weight:bold; }
  #timingCursor { position:absolute; top:0; width:12px; height:100%; background:white; box-shadow: 0 0 20px white; border-radius: 6px; }

  .stop-btn {
    width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--danger);
    background: transparent; color: white; font-family: 'Cinzel', serif;
    font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.1s;
  }
  .stop-btn:active { transform: scale(0.9); background: rgba(231,76,60,0.2); }

  .dmg-popup { position:absolute; font-weight:900; font-size:24px; animation: dmgFloat 1s forwards; z-index: 50; }
  @keyframes dmgFloat { 0% {opacity:1; transform:translateY(0);} 100% {opacity:0; transform:translateY(-60px);} }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div id="difficultyScreen">
  <div class="diff-main-title">⚡ WIZARD DUEL ⚡</div>
  <div class="diff-grid">
    <div class="diff-card" onclick="selectDifficulty('easy')"><h3 style="color:var(--success)">EASY</h3><p>초보 마법사</p></div>
    <div class="diff-card" onclick="selectDifficulty('normal')"><h3 style="color:var(--harry-color)">NORMAL</h3><p>호그와트 학생</p></div>
    <div class="diff-card" onclick="selectDifficulty('hard')"><h3 style="color:var(--warn)">HARD</h3><p>오로르 수준</p></div>
    <div class="diff-card" onclick="selectDifficulty('master')"><h3 style="color:var(--danger)">MASTER</h3><p>죽음을 먹는 자</p></div>
  </div>
</div>

<div id="gameScreen">
  <div class="wrapper">
    <div class="status-bar">
      <div id="turnIndicator" style="color:var(--gold); font-weight:bold;">👓 해리의 턴</div>
      <div id="turnCount">턴 1</div>
    </div>

    <div class="battlefield">
      <div class="fighter-panel active-turn" id="harryPanel">
        <div class="spell-name">HARRY POTTER</div>
        <div class="sprite-area"><img src="https://img.freepik.com/free-photo/view-graphic-3d-wizard-boy_23-2150706346.jpg?t=st=1715068000~exp=1715071600~hmac=a898" class="sprite-img"></div>
        <div id="harryBadges"></div>
        <div class="hp-track"><div id="harryHpBar" class="hp-fill" style="background:var(--success); width:100%;"></div></div>
        <div id="harryHpNum" style="font-size:12px;">100/100</div>
        <div id="harryMpLabel" class="mp-label">MP: 100</div>
      </div>

      <div style="font-family:'Cinzel'; font-size:24px; color:var(--gold);">VS</div>

      <div class="fighter-panel" id="voldyPanel">
        <div class="spell-name" style="color:var(--voldy-color)">VOLDEMORT</div>
        <div class="sprite-area"><img src="https://img.freepik.com/free-photo/view-graphic-3d-reaper_23-2150706333.jpg" class="sprite-img"></div>
        <div id="voldyBadges"></div>
        <div class="hp-track"><div id="voldyHpBar" class="hp-fill" style="background:var(--success); width:100%;"></div></div>
        <div id="voldyHpNum" style="font-size:12px;">160/160</div>
      </div>
    </div>

    <div id="logBox"></div>

    <div class="spell-grid">
      <button class="spell-btn" id="btnExpel" onclick="startTiming('익스펙토')">
        <span class="spell-cost">20MP</span>
        <span class="spell-name">Expelliarmus</span>
        <span style="font-size:9px;">기본 공격 (피해 22)</span>
      </button>
      <button class="spell-btn" id="btnStupefy" onclick="startTiming('스투페파이')">
        <span class="spell-cost">30MP</span>
        <span class="spell-name">Stupefy</span>
        <span style="font-size:9px;">턴 스킵 (쿨 2턴)</span>
      </button>
      <button class="spell-btn" id="btnProtego" onclick="startTiming('프로테고')">
        <span class="spell-cost">15MP</span>
        <span class="spell-name">Protego</span>
        <span style="font-size:9px;">85% 확률 완전회피</span>
      </button>
      <button class="spell-btn" id="btnAvada" onclick="startTiming('아바다')">
        <span class="spell-cost">50MP</span>
        <span class="spell-name" style="color:var(--danger)">Avada Kedavra</span>
        <span style="font-size:9px;">피해 85 (초고속)</span>
      </button>
      <button class="spell-btn" id="btnLumos" onclick="startTiming('루모스')">
        <span class="spell-cost">0MP</span>
        <span class="spell-name">Lumos Maxima</span>
        <span style="font-size:9px;">MP 40 회복</span>
      </button>
      <button class="spell-btn" onclick="doWait()">
        <span class="spell-cost">PASS</span>
        <span class="spell-name">Wait</span>
        <span style="font-size:9px;">MP 20 회복</span>
      </button>
    </div>
  </div>
</div>

<div id="timingOverlay">
  <div id="timingSpellName" style="color:var(--gold); font-family:'Cinzel'; font-size:28px;">SPELL</div>
  <div id="timingHint" style="color:var(--muted); font-size:14px;">노란색 구간에서 멈추세요!</div>
  <div class="timing-bar-wrap" id="timingBarWrap">
    <div id="tzCrit" class="tz-crit-zone">CRITICAL</div>
    <div id="timingCursor"></div>
  </div>
  <button class="stop-btn" onclick="doStop()">CAST</button>
</div>

<script>
// --- 별 배경 생성 ---
(function(){
  const c = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
    s.style.animationDuration = (Math.random()*3+2)+'s';
    c.appendChild(s);
  }
})();

// --- 게임 상태 관리 ---
let D = {};
const STATE = {
  harryHP: 100, harryMaxHP: 100, harryMP: 100,
  voldyHP: 160, voldyMaxHP: 160,
  turn: 1, turnCount: 1, isOver: false, isProcessing: false,
  stupefyCd: 0, 
  harryShield: false, voldyStunned: false
};

const PRESETS = {
  easy: { vHP: 110, speed: 0.4, critW: 0.18 },
  normal: { vHP: 160, speed: 0.6, critW: 0.12 },
  hard: { vHP: 220, speed: 0.8, critW: 0.08 },
  master: { vHP: 300, speed: 1.1, critW: 0.05 }
};

function selectDifficulty(key) {
  D = PRESETS[key];
  STATE.voldyHP = STATE.voldyMaxHP = D.vHP;
  document.getElementById('difficultyScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  updateUI();
  addLog("결투가 시작되었습니다! 지팡이를 준비하세요.", "#f0c060");
}

function addLog(msg, color="white") {
  const lb = document.getElementById('logBox');
  const d = document.createElement('div');
  d.style.color = color; d.innerHTML = msg;
  lb.appendChild(d); lb.scrollTop = lb.scrollHeight;
}

// --- 타이밍 미니게임 로직 ---
let rafId, isTiming = false, curSpell = '', cursorPos = 0, cursorDir = 1, curSpeed = 0;

function startTiming(spell) {
  if (STATE.turn !== 1 || STATE.isOver || STATE.isProcessing) return;

  const costs = { '익스펙토': 20, '스투페파이': 30, '프로테고': 15, '아바다': 50, '루모스': 0 };
  if (STATE.harryMP < costs[spell]) return addLog("마력이 부족합니다!", "red");
  if (spell === '스투페파이' && STATE.stupefyCd > 0) return addLog(`Stupefy 쿨타임 중입니다! (${STATE.stupefyCd}턴 남음)`, "orange");

  curSpell = spell;
  document.getElementById('timingOverlay').style.display = 'flex';
  document.getElementById('timingSpellName').innerText = spell;

  let speedMult = 1, critMult = 1;
  if (spell === '아바다') { speedMult = 2.5; critMult = 0.4; } // 아바다 난이도 대폭 상승
  if (spell === '프로테고') { speedMult = 0.7; critMult = 1.2; }

  curSpeed = D.speed * speedMult;
  const critW = D.critW * critMult;
  const bw = 400;

  const critZone = document.getElementById('tzCrit');
  critZone.style.width = (critW * bw * 2) + "px";
  critZone.style.left = (bw / 2 - critW * bw) + "px";

  cursorPos = 0; cursorDir = 1; isTiming = true;
  loop();
}

function loop() {
  if (!isTiming) return;
  cursorPos += (curSpeed * cursorDir * 2.5);
  if (cursorPos >= 100 || cursorPos <= 0) cursorDir *= -1;
  document.getElementById('timingCursor').style.left = cursorPos + "%";
  rafId = requestAnimationFrame(loop);
}

function doStop() {
  isTiming = false;
  cancelAnimationFrame(rafId);
  document.getElementById('timingOverlay').style.display = 'none';

  const dist = Math.abs(cursorPos - 50);
  let speedMult = (curSpell === '아바다' ? 0.4 : 1);
  const critThreshold = (D.critW * speedMult) * 100;

  let result = 'miss';
  if (dist < critThreshold) result = 'crit';
  else if (dist < critThreshold * 2.5) result = 'hit';

  executeHarrySpell(curSpell, result);
}

// --- 해리 주문 실행 ---
function executeHarrySpell(spell, result) {
  STATE.isProcessing = true;
  let dmg = 0;
  
  if (result === 'miss') {
    addLog(`${spell} 시전 실패! 주문이 빗나갔습니다.`, "#8899aa");
  } else {
    const isCrit = result === 'crit';
    const mult = isCrit ? 1.5 : 1;

    if (spell === '익스펙토') {
      dmg = Math.round(22 * mult);
      STATE.voldyHP -= dmg;
      addLog(`⚡ Expelliarmus! 볼드모트에게 ${dmg} 데미지!`, "#4a9eff");
      showDmg('voldy', dmg, isCrit);
    } 
    else if (spell === '스투페파이') {
      dmg = Math.round(12 * mult);
      STATE.voldyHP -= dmg;
      showDmg('voldy', dmg, isCrit);
      if (isCrit) {
        STATE.voldyStunned = true;
        STATE.stupefyCd = 3; // 성공 시 쿨타임
        addLog("🌀 Stupefy! 볼드모트를 기절시켰습니다! (추가 턴 획득)", "yellow");
      } else {
        addLog("🌀 Stupefy! 약간의 데미지만 입혔습니다.", "#4a9eff");
      }
    } 
    else if (spell === '프로테고') {
      STATE.harryShield = true;
      addLog("🛡️ Protego! 강력한 방어막을 형성했습니다. (완전회피 확률 85%)", "var(--success)");
    } 
    else if (spell === '아바다') {
      dmg = Math.round(85 * mult);
      STATE.voldyHP -= dmg;
      addLog("💀 AVADA KEDAVRA!!! 볼드모트에게 치명적인 일격을 가했습니다!", "red");
      showDmg('voldy', dmg, isCrit);
    } 
    else if (spell === '루모스') {
      STATE.harryMP = Math.min(100, STATE.harryMP + 40);
      addLog("💡 Lumos Maxima! 마력을 보충했습니다.", "#f1c40f");
    }
    
    const costs = { '익스펙토': 20, '스투페파이': 30, '프로테고': 15, '아바다': 50, '루모스': 0 };
    STATE.harryMP -= costs[spell];
  }

  updateUI();
  if (checkGameOver()) return;

  // 턴 전환 지연
  setTimeout(() => {
    if (STATE.voldyStunned) {
      STATE.voldyStunned = false;
      STATE.isProcessing = false;
      STATE.turnCount++;
      addLog("👓 해리의 연속 공격 기회!");
      document.getElementById('turnIndicator').innerText = "👓 해리의 턴";
    } else {
      STATE.turn = 2;
      voldemortTurn();
    }
  }, 1000);
}

// --- 볼드모트 AI 턴 ---
function voldemortTurn() {
  if (STATE.isOver) return;
  STATE.isProcessing = true;
  document.getElementById('turnIndicator').innerText = "🐍 볼드모트의 턴";
  document.getElementById('voldyPanel').classList.add('active-turn');
  document.getElementById('harryPanel').classList.remove('active-turn');

  addLog("볼드모트가 지팡이를 휘두릅니다...", "var(--voldy-color)");

  setTimeout(() => {
    // 프로테고 상태일 때 85% 확률로 회피
    if (STATE.harryShield && Math.random() < 0.85) {
      addLog("🛡️ 해리가 볼드모트의 저주를 가볍게 튕겨냈습니다!", "var(--success)");
    } else {
      let vDmg = Math.round((22 + Math.random()*8) * (D.vHP/150));
      if (STATE.harryShield) vDmg = Math.round(vDmg * 0.2); // 회피 실패해도 80% 데미지 감소
      STATE.harryHP -= vDmg;
      addLog(`🐍 볼드모트: "크루시오!" 해리가 ${vDmg}의 데미지를 입었습니다.`, "var(--danger)");
      showDmg('harry', vDmg, false);
    }

    STATE.harryShield = false;
    if (STATE.stupefyCd > 0) STATE.stupefyCd--;
    
    STATE.turn = 1;
    STATE.turnCount++;
    STATE.isProcessing = false;
    document.getElementById('turnIndicator').innerText = "👓 해리의 턴";
    document.getElementById('harryPanel').classList.add('active-turn');
    document.getElementById('voldyPanel').classList.remove('active-turn');
    updateUI();
    checkGameOver();
  }, 1500);
}

function doWait() {
  if (STATE.turn !== 1 || STATE.isProcessing) return;
  STATE.harryMP = Math.min(100, STATE.harryMP + 20);
  addLog("해리가 숨을 고르며 마력을 회복합니다. (MP +20)");
  STATE.turn = 2;
  updateUI();
  voldemortTurn();
}

function updateUI() {
  document.getElementById('harryHpBar').style.width = (STATE.harryHP/STATE.harryMaxHP*100)+'%';
  document.getElementById('voldyHpBar').style.width = (STATE.voldyHP/STATE.voldyMaxHP*100)+'%';
  document.getElementById('harryHpNum').innerText = `${Math.max(0, STATE.harryHP)}/${STATE.harryMaxHP}`;
  document.getElementById('voldyHpNum').innerText = `${Math.max(0, STATE.voldyHP)}/${STATE.voldyMaxHP}`;
  document.getElementById('harryMpLabel').innerText = `MP: ${STATE.harryMP}`;
  document.getElementById('turnCount').innerText = `턴 ${STATE.turnCount}`;

  document.querySelectorAll('.spell-btn').forEach(btn => {
    btn.disabled = (STATE.turn !== 1 || STATE.isProcessing);
  });
}

function showDmg(target, amount, isCrit) {
  const panel = document.getElementById(target + 'Panel');
  const p = document.createElement('div');
  p.className = 'dmg-popup';
  p.style.color = isCrit ? 'var(--warn)' : 'var(--danger)';
  p.style.left = '50%';
  p.innerText = (isCrit ? '💥 ' : '') + '-' + amount;
  panel.appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

function checkGameOver() {
  if (STATE.voldyHP <= 0) {
    addLog("✨ 볼드모트가 소멸했습니다! 평화가 찾아왔습니다.", "var(--gold)");
    STATE.isOver = true; return true;
  }
  if (STATE.harryHP <= 0) {
    addLog("💀 해리가 쓰러졌습니다... 호그와트가 함락되었습니다.", "var(--danger)");
    STATE.isOver = true; return true;
  }
  return false;
}
</script>
</body>
</html>
